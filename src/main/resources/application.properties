spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:}}
spring.mongodb.uri=${spring.data.mongodb.uri}
spring.application.name=localnews-backend
server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:localnews-default-dev-secret-change-in-production-min32chars}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://local-news-admin.vercel.app}

# Ollama local LLM – ensure `ollama serve` is running and the model is pulled
# e.g. `ollama pull llama3`
ollama.model=${OLLAMA_MODEL:llama3}
ollama.timeout.seconds=${OLLAMA_TIMEOUT_SECONDS:300}

# yt-dlp transcript extraction
ytdlp.timeout.seconds=${YTDLP_TIMEOUT_SECONDS:120}

# Maximum transcript characters forwarded to the LLM (prevents token overflow)
transcript.max.chars=${TRANSCRIPT_MAX_CHARS:4000}
